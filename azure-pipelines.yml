trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - main
      - master
      - develop

parameters:
  - name: environment
    displayName: "Target environment"
    type: string
    default: preprod
    values:
      - preprod
      - prod
      - staging

  - name: browser
    displayName: "Browser to test"
    type: string
    default: chromium
    values:
      - chromium
      - firefox
      - webkit

  - name: test_markers
    displayName: "Pytest markers (smoke, regression, login, critical) - leave empty for all"
    type: string
    default: ""

  - name: headless
    displayName: "Run in headless mode"
    type: boolean
    default: false

  - name: parallel_workers
    displayName: "Number of parallel workers"
    type: number
    default: 1

variables:
  PYTHON_VERSION: "3.11"

stages:
  - stage: Test
    displayName: "Run Playwright Tests"
    jobs:
      - job: PlaywrightTests
        displayName: "Tests [${{ parameters.environment }}] [${{ parameters.browser }}]"
        pool:
          name: SelfHostedWindows
          demands:
            - Agent.ComputerName -equals New8
        timeoutInMinutes: 30

        steps:
          - checkout: self
            clean: true

          - task: UsePythonVersion@0
            displayName: "Set up Python"
            inputs:
              versionSpec: $(PYTHON_VERSION)
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: "Install dependencies"

          - script: |
              python -m playwright install --with-deps ${{ parameters.browser }}
            displayName: "Install Playwright browsers"

          - script: |
              set HEADLESS=${{ parameters.headless }}
              set MARKERS=${{ parameters.test_markers }}
              set WORKERS=${{ parameters.parallel_workers }}

              set "MARKER_FLAG="
              if not "${{ parameters.test_markers }}"=="" set "MARKER_FLAG=-m ${{ parameters.test_markers }}"

              set "WORKER_FLAG="
              if ${{ parameters.parallel_workers }} GTR 1 set "WORKER_FLAG=-n ${{ parameters.parallel_workers }}"

              pytest tests/ ^
                --env=${{ parameters.environment }} ^
                --browser-type=${{ parameters.browser }} ^
                --headless-mode=${{ parameters.headless }} ^
                %MARKER_FLAG% ^
                %WORKER_FLAG% ^
                --alluredir=reports/allure-results ^
                --html=reports/report.html ^
                --self-contained-html ^
                -v ^
                --tb=short
            displayName: "Run tests"
            env:
              ENV: ${{ parameters.environment }}
              BROWSER: ${{ parameters.browser }}
              HEADLESS: ${{ parameters.headless }}
              VALID_USERNAME: $(VALID_USERNAME)
              VALID_PASSWORD: $(VALID_PASSWORD)

          - task: PublishPipelineArtifact@1
            displayName: "Upload Allure results"
            condition: always()
            inputs:
              targetPath: reports/allure-results
              artifact: allure-results-${{ parameters.environment }}-${{ parameters.browser }}

          - task: PublishPipelineArtifact@1
            displayName: "Upload HTML report"
            condition: always()
            inputs:
              targetPath: reports/report.html
              artifact: html-report-${{ parameters.environment }}-${{ parameters.browser }}

          - task: PublishPipelineArtifact@1
            displayName: "Upload screenshots"
            condition: always()
            inputs:
              targetPath: screenshots/
              artifact: screenshots-${{ parameters.environment }}-${{ parameters.browser }}

  - stage: Report
    displayName: "Generate Allure Report"
    dependsOn: Test
    condition: always()
    jobs:
      - job: AllureReport
        displayName: "Generate Allure Report"
        pool:
          name: SelfHostedWindows
          demands:
            - Agent.ComputerName -equals New8

        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download Allure results"
            inputs:
              artifact: allure-results-${{ parameters.environment }}-${{ parameters.browser }}
              targetPath: $(System.DefaultWorkingDirectory)/allure-results

          - script: |
              allure generate allure-results --clean -o allure-report
            displayName: "Generate Allure report"

          - task: PublishPipelineArtifact@1
            displayName: "Upload Allure report"
            condition: always()
            inputs:
              targetPath: allure-report/
              artifact: allure-report